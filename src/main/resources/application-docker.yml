# Docker Compose profile — all middleware referenced by Docker service names
# Activated via SPRING_PROFILES_ACTIVE=docker in docker-compose.yml

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/ticketrush?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
  data:
    redis:
      host: redis
  elasticsearch:
    uris:
      - http://elasticsearch:9200
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848
      config:
        server-addr: nacos:8848
        import-check:
          enabled: false
    sentinel:
      transport:
        dashboard: sentinel-dashboard:8858

rocketmq:
  name-server: rocketmq-namesrv:9876

seata:
  service:
    grouplist:
      default: seata:8091

# Disable nacosConfig health indicator — Nacos has no remote config for this app,
# causing the indicator to report DOWN. This is not an actual failure.
management:
  health:
    nacos-config:
      enabled: false
