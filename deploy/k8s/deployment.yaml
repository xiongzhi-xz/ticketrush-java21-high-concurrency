apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketrush
  namespace: ticketrush
  labels:
    app: ticketrush
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ticketrush
  template:
    metadata:
      labels:
        app: ticketrush
    spec:
      containers:
        - name: ticketrush
          image: ghcr.io/xiongzhi-xz/ticketrush:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ticketrush-config
            - secretRef:
                name: ticketrush-secret
          env:
            - name: JAVA_OPTS
              value: "--enable-preview -XX:MaxRAMPercentage=75.0 -Duser.timezone=Asia/Shanghai"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 500m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 1536Mi
